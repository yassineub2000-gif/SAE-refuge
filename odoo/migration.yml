migration:
  versions:
    - version: setup
      operations:
        pre:
          - odoo -i base --stop-after-init --workers=0 --no-xmlrpc
          - anthem songs.install.pre::main
          - odoo -i refuge_aventuriers,refuge_table_order,refuge_planning --stop-after-init --workers=0 --no-xmlrpc
      modes:
        sample:
          operations:
            post:
              - anthem songs.sample.data_sample::main
        full:
          operations:
            post:
              - anthem songs.install.data_full::main
      addons:
        upgrade:
          - base
          - refuge_aventuriers
          - refuge_table_order
          - refuge_planning
